<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · CORE4</title>
  <link rel="stylesheet" href="/core4/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">αOS</div>
    <div class="tabs">
      <button class="tab active">CORE</button>
      <button class="tab" onclick="location.href='/core4/fire.html'">FIRE</button>
      <button class="tab" onclick="location.href='/game/focus.html'">FOCUS</button>
      <button class="tab" onclick="location.href='/'">HUB</button>
    </div>
  </header>

  <main class="wrap">

    <!-- Hero: Ring + Scores -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="52" />
          <circle class="ring-track" cx="60" cy="60" r="52" id="ringTrack" />
        </svg>
        <div class="ring-center">
          <div class="ring-score" id="dailyScore">0</div>
          <div class="ring-label">/ 4</div>
        </div>
      </div>

      <div class="scores">
        <div class="score-card">
          <div class="sc-label">DAILY</div>
          <div class="sc-value">
            <span id="dailyPct">0%</span>
          </div>
        </div>
        <div class="score-card">
          <div class="sc-label">WEEKLY</div>
          <div class="sc-value">
            <span id="weeklyScore">0</span><span class="sc-max">/28</span>
          </div>
        </div>
        <div class="score-card date-card">
          <div class="sc-label">TODAY</div>
          <div class="sc-date" id="dateLabel">—</div>
        </div>
      </div>
    </section>

    <!-- Section header -->
    <div class="section-head">
      <span class="sh-title">CORE4</span>
      <span class="sh-sub" id="weekLabel">—</span>
    </div>

    <!-- Domain cards -->
    <section id="cards" class="cards"></section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </main>

  <script src="/core4/app.js"></script>
</body>
</html>
