<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>αOS · Links</title>
  <link rel="stylesheet" href="/links.css" />
</head>
<body>
  <header class="bar">
    <div>
      <div class="kicker">αOS · INDEX NODE</div>
      <div class="title">Serve / Funnel Links (incl. Vital Hub)</div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <button id="tabLocal" class="btn btn-active">Lokal</button>
      <button id="tabTailscale" class="btn">Tailscale</button>
      <button id="refresh" class="btn">Refresh</button>
    </div>
  </header>

  <main class="wrap">
    <div id="viewLocal">
      <section class="card">
        <div class="card-title">Routes (Lokal)</div>
        <div class="grid" id="routeGrid"></div>
      </section>

      <section class="card">
        <div class="card-title">Active Ports</div>
        <div class="grid" id="portGrid"></div>
      </section>

      <section class="card">
        <div class="card-title">Menu Links</div>
        <div class="grid" id="menuGrid"></div>
      </section>
    </div>

    <div id="viewTailscale" style="display:none">
      <section class="card">
        <div class="card-title">Tailscale Funnel Routes</div>
        <div class="grid" id="tailscaleGrid"></div>
      </section>
    </div>
  </main>

  <script src="/links.js"></script>
</body>
</html>
