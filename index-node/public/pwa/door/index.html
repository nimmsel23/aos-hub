<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · THE DOOR</title>
  <link rel="manifest" href="/pwa/door/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/door/icon-192.svg" />
  <link rel="stylesheet" href="/pwa/door/style.css" />
</head>
<body>

  <!-- App header -->
  <header class="appbar">
    <span class="app-title">THE DOOR</span>
    <span class="app-phase" id="appPhase">POTENTIAL</span>
  </header>

  <main class="wrap">
    <!-- Phase content (dynamically rendered) -->
    <section id="content" class="content"></section>
  </main>

  <!-- Bottom Nav: 4P Flow -->
  <nav class="bottomnav">
    <button class="bn-btn active" data-phase="potential">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>POTENTIAL</span>
    </button>
    <button class="bn-btn" data-phase="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <span>PLAN</span>
    </button>
    <button class="bn-btn" data-phase="production">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <span>PRODUCTION</span>
    </button>
    <button class="bn-btn" data-phase="profit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span>PROFIT</span>
    </button>
  </nav>

  <script src="/pwa/gas-fallback.js"></script>
  <script src="/pwa/door/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/door/sw.js", { scope: "/pwa/door/" });
    }
  </script>
</body>
</html>
