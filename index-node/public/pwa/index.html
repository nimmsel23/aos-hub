<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>αOS PWA Hub</title>
    <style>
      :root {
        --bg: #0b1017;
        --panel: #111a24;
        --panel-2: #162333;
        --line: #23384f;
        --text: #e6edf5;
        --muted: #93a4b8;
        --ok: #46d39a;
        --bad: #ff6f7d;
        --warn: #f1c96b;
        --accent: #7bc3ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(1100px 600px at 90% -10%, #1d3149 0%, transparent 55%),
          radial-gradient(900px 500px at -10% 0%, #182a3f 0%, transparent 60%),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        width: min(1100px, 100%);
        margin: 0 auto;
        padding: 20px 14px 28px;
      }
      .header {
        margin-bottom: 14px;
      }
      .kicker {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 6px 0 0;
        font-size: 30px;
        letter-spacing: 0.01em;
      }
      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }
      .panel {
        border: 1px solid var(--line);
        background: linear-gradient(170deg, var(--panel), var(--panel-2));
        border-radius: 14px;
        padding: 14px;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 15px;
        letter-spacing: 0.02em;
      }
      .status {
        grid-column: span 12;
      }
      .apps {
        grid-column: span 12;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      .stat {
        background: rgba(8, 13, 19, 0.45);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
      }
      .stat .label {
        color: var(--muted);
        font-size: 12px;
      }
      .stat .value {
        margin-top: 4px;
        font-size: 15px;
        font-weight: 700;
        word-break: break-word;
      }
      .value.ok {
        color: var(--ok);
      }
      .value.bad {
        color: var(--bad);
      }
      .value.warn {
        color: var(--warn);
      }
      .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
      }
      .group {
        margin-top: 12px;
      }
      .group:first-child {
        margin-top: 0;
      }
      .group-title {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .app {
        display: block;
        text-decoration: none;
        color: inherit;
        background: rgba(8, 13, 19, 0.5);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
      }
      .app:hover {
        border-color: var(--accent);
      }
      .app-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .app-name {
        font-weight: 700;
        font-size: 14px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #556;
      }
      .dot.ok {
        background: var(--ok);
      }
      .dot.bad {
        background: var(--bad);
      }
      .app-path {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .foot {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <div class="kicker">αOS Frontdoor</div>
        <h1>/pwa Landing</h1>
        <p class="sub">Launcher fuer alle PWA-Routen + einfacher Laufzeit-Status.</p>
      </header>

      <section class="grid">
        <article class="panel status">
          <h2>Systemstatus</h2>
          <div class="stats">
            <div class="stat">
              <div class="label">PWA Runtime</div>
              <div class="value" id="runtimeStatus">pruefe...</div>
            </div>
            <div class="stat">
              <div class="label">Host</div>
              <div class="value" id="runtimeHost">-</div>
            </div>
            <div class="stat">
              <div class="label">Port</div>
              <div class="value" id="runtimePort">-</div>
            </div>
            <div class="stat">
              <div class="label">GAS Fallback Routes</div>
              <div class="value" id="gasRoutes">pruefe...</div>
            </div>
            <div class="stat">
              <div class="label">Last Check</div>
              <div class="value" id="lastCheck">-</div>
            </div>
          </div>
          <div class="foot">Refresh im Browser aktualisiert alle Checks.</div>
        </article>

        <article class="panel apps">
          <h2>PWA Launcher (wie pwactx)</h2>
          <div id="appGroups"></div>
        </article>
      </section>
    </main>

    <script>
      (function () {
        const APP_GROUPS = [
          {
            key: "business",
            title: "Business",
            apps: [
              { id: "clients", label: "Klienten Hub", path: "http://127.0.0.1:8788/clientctx/" },
              { id: "clientctx", label: "Client Runtime", path: "http://127.0.0.1:4100/" },
            ],
          },
          {
            key: "runtime",
            title: "Core Runtimes",
            apps: [
              { id: "core4", label: "Core4", path: "/pwa/core4/" },
              { id: "fitness", label: "Fitness", path: "/pwa/fitness/" },
              { id: "memoirs", label: "Memoirs", path: "/pwa/memoirs/" },
            ],
          },
          {
            key: "door",
            title: "Door",
            apps: [
              { id: "door", label: "Door", path: "/pwa/door/" },
              { id: "potential", label: "Potential", path: "/pwa/potential/" },
              { id: "plan", label: "Plan", path: "/pwa/plan/" },
              { id: "production", label: "Production", path: "/pwa/production/" },
              { id: "profit", label: "Profit", path: "/pwa/profit/" },
            ],
          },
          {
            key: "game",
            title: "Game",
            apps: [
              { id: "game", label: "Game", path: "/pwa/game/" },
              { id: "frame", label: "Frame", path: "/pwa/frame/" },
              { id: "freedom", label: "Freedom", path: "/pwa/freedom/" },
              { id: "focus", label: "Focus", path: "/pwa/focus/" },
              { id: "fire", label: "Fire", path: "/pwa/fire/" },
              { id: "tent", label: "Tent", path: "/pwa/tent/" },
              { id: "daily", label: "Daily", path: "/pwa/daily/" },
            ],
          },
        ];
        const APPS = APP_GROUPS.flatMap((group) => group.apps);

        const el = (id) => document.getElementById(id);
        const appGroups = el("appGroups");

        function markValue(node, text, klass) {
          node.textContent = text;
          node.classList.remove("ok", "bad", "warn");
          if (klass) node.classList.add(klass);
        }

        function renderApps() {
          appGroups.innerHTML = "";
          for (const group of APP_GROUPS) {
            const section = document.createElement("section");
            section.className = "group";
            const title = document.createElement("h3");
            title.className = "group-title";
            title.textContent = group.title;
            const grid = document.createElement("div");
            grid.className = "app-grid";
            for (const app of group.apps) {
              const a = document.createElement("a");
              a.className = "app";
              a.href = app.path;
              a.innerHTML = `
                <div class="app-head">
                  <div class="app-name">${app.label}</div>
                  <div class="dot" id="dot-${app.id}" title="Status"></div>
                </div>
                <div class="app-path">${app.path}</div>
              `;
              grid.appendChild(a);
            }
            section.appendChild(title);
            section.appendChild(grid);
            appGroups.appendChild(section);
          }
        }

        async function checkRuntime() {
          try {
            const response = await fetch("/health", { cache: "no-store" });
            if (!response.ok) throw new Error("health " + response.status);
            const data = await response.json();
            markValue(el("runtimeStatus"), data.ok ? "online" : "offline", data.ok ? "ok" : "bad");
            markValue(el("runtimeHost"), String(data.host || "-"));
            markValue(el("runtimePort"), String(data.port || "-"));
          } catch (_err) {
            markValue(el("runtimeStatus"), "offline", "bad");
            markValue(el("runtimeHost"), "-");
            markValue(el("runtimePort"), "-");
          }
        }

        async function checkGasRoutes() {
          try {
            const response = await fetch("/gas", { cache: "no-store" });
            if (!response.ok) throw new Error("gas " + response.status);
            const data = await response.json();
            const routes = data && data.routes && typeof data.routes === "object" ? data.routes : {};
            const configured = Object.values(routes).filter(Boolean).length;
            markValue(el("gasRoutes"), `${configured} konfiguriert`, configured > 0 ? "ok" : "warn");
          } catch (_err) {
            markValue(el("gasRoutes"), "nicht verfuegbar", "bad");
          }
        }

        async function checkAppReachability() {
          await Promise.all(
            APPS.map(async (app) => {
              const dot = el(`dot-${app.id}`);
              if (!dot) return;
              try {
                const isExternal = /^https?:\/\//i.test(app.path);
                const response = await fetch(app.path, isExternal
                  ? { method: "HEAD", cache: "no-store", mode: "no-cors" }
                  : { method: "HEAD", cache: "no-store", redirect: "manual" });
                const redirected = response.type === "opaqueredirect";
                const opaque = response.type === "opaque";
                const okStatus = response.ok || (response.status >= 300 && response.status < 400);
                if (!okStatus && !redirected && !opaque) throw new Error("status " + response.status);
                dot.classList.add("ok");
              } catch (_err) {
                dot.classList.add("bad");
              }
            })
          );
        }

        async function boot() {
          renderApps();
          await Promise.all([checkRuntime(), checkGasRoutes(), checkAppReachability()]);
          el("lastCheck").textContent = new Date().toLocaleString("de-AT");
        }

        boot();
      })();
    </script>
  </body>
</html>
