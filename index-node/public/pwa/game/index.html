<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · THE GAME</title>
  <link rel="manifest" href="/pwa/game/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/game/icon-192-v2.svg" />
  <link rel="stylesheet" href="/pwa/game/style.css" />
</head>
<body>

  <!-- App header -->
  <header class="appbar">
    <div class="appbar-left">
      <div class="app-kicker">αOS · THE GAME</div>
      <div class="app-title">The Game</div>
    </div>
    <div class="appbar-right">
      <div class="app-subtitle" id="appSubtitle">—</div>
      <div class="app-hint">Fact Maps Cascade</div>
    </div>
  </header>

  <!-- Top Nav: Map Cascade -->
  <nav class="topnav" aria-label="Map Cascade">
    <button class="tn-tab active" data-map="frame">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="7" cy="7" r="1.5"/>
        <circle cx="17" cy="7" r="1.5"/>
        <circle cx="7" cy="17" r="1.5"/>
        <circle cx="17" cy="17" r="1.5"/>
      </svg>
      <span>FRAME</span>
      <span class="tn-sub">Facts</span>
    </button>
    <button class="tn-tab" data-map="freedom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span>FREE</span>
      <span class="tn-sub">Vision</span>
    </button>
    <button class="tn-tab" data-map="focus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
      <span>FOCUS</span>
      <span class="tn-sub">Mission</span>
    </button>
    <button class="tn-tab" data-map="fire">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2c0 0-6 6-6 12a6 6 0 0 0 12 0c0-6-6-12-6-12z"/>
        <path d="M12 12c0 0-3 3-3 5a3 3 0 0 0 6 0c0-2-3-5-3-5z"/>
      </svg>
      <span>FIRE</span>
      <span class="tn-sub">Execution</span>
    </button>
  </nav>

  <main class="wrap">
    <section class="hero">
      <div class="hero-copy">
        <div class="hero-label">FACT MAPS</div>
        <h1 class="hero-title">Enter The Game.</h1>
        <p class="hero-sub">Frame → Freedom → Focus → Fire. Pick a map, then a domain. Win the week.</p>
      </div>
      <div class="hero-badge">
        <div class="badge-title">Cascade</div>
        <div class="badge-body">Now → Horizon → Mission → War</div>
      </div>
    </section>

    <!-- Domain cards container -->
    <section id="cards" class="cards" aria-live="polite">
      <div class="loading">Loading...</div>
    </section>
  </main>

  <!-- Bottom Nav: Centers -->
  <nav class="bottomnav">
    <button class="bn-btn" onclick="location.href='/pwa/core4/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      </svg>
      <span>CORE</span>
    </button>
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
      <span>GAME</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/door/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="2" width="18" height="20" rx="2"/>
        <circle cx="16" cy="12" r="1"/>
      </svg>
      <span>DOOR</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/score/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>SCORE</span>
    </button>
  </nav>

  <script src="/pwa/gas-fallback.js"></script>
  <script src="/pwa/game/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/game/sw.js", { scope: "/pwa/game/" });
    }
  </script>
</body>
</html>
