<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · FIRE</title>
  <link rel="manifest" href="/pwa/fire/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/fire/icon-192-v3.svg" />
  <link rel="stylesheet" href="/pwa/fire/style.css" />
</head>
<body>

  <header class="appbar">
    <span class="app-title">αOS · FIRE</span>
    <span class="app-week" id="appWeek">—</span>
  </header>

  <main class="wrap">
    <div class="section-head">
      <span class="sh-title">TODAY</span>
      <span class="sh-sub" id="dayLabel">—</span>
    </div>
    <section id="daily-content" class="cards"></section>

    <div class="section-head">
      <span class="sh-title">WEEK</span>
      <span class="sh-sub" id="weekLabel">—</span>
    </div>
    <section id="weekly-content" class="cards"></section>

    <div class="toast" id="fireError"></div>
  </main>

  <nav class="bottomnav">
    <button class="bn-btn" onclick="location.href='/pwa/core4/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span>CORE4</span>
    </button>
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 0-6 6-6 12a6 6 0 0 0 12 0c0-6-6-12-6-12z"/><path d="M12 12c0 0-3 3-3 5a3 3 0 0 0 6 0c0-2-3-5-3-5z"/></svg>
      <span>FIRE</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/door/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="1"/><circle cx="14" cy="12" r="1"/></svg>
      <span>DOOR</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/game/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><circle cx="8" cy="16" r="3"/><circle cx="16" cy="16" r="3"/></svg>
      <span>GAME</span>
    </button>
  </nav>

  <script src="/pwa/gas-fallback.js"></script>
  <script src="/pwa/fire/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/fire/sw.js", { scope: "/pwa/fire/" });
    }
  </script>
</body>
</html>
