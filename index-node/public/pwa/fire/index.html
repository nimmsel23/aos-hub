<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · FIRE</title>
  <link rel="manifest" href="/pwa/fire/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/core4/icon-192.svg" />
  <link rel="stylesheet" href="/pwa/fire/style.css" />
</head>
<body>

  <header class="appbar">
    <span class="app-title">αOS · FIRE</span>
    <span class="app-week" id="appWeek">—</span>
  </header>

  <main class="wrap">

    <!-- Hero -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="52" />
          <circle class="ring-track" cx="60" cy="60" r="52" id="ringTrack" />
        </svg>
        <div class="ring-center">
          <div class="ring-score" id="strikesDone">0</div>
          <div class="ring-label">/ 16</div>
        </div>
      </div>
      <div class="scores">
        <div class="score-card">
          <div class="sc-label">STRIKES</div>
          <div class="sc-value"><span id="strikePct">0%</span></div>
        </div>
        <div class="score-card">
          <div class="sc-label">WEEK</div>
          <div class="sc-value sc-week" id="weekLabel">—</div>
        </div>
      </div>
    </section>

    <!-- Section head -->
    <div class="section-head">
      <span class="sh-title">FIRE</span>
      <span class="sh-sub">STRUCTURED BLAZE · 4×4</span>
    </div>

    <!-- Domain cards -->
    <section id="cards" class="cards"></section>

    <!-- Add from tasks button -->
    <button class="sheet-trigger" id="sheetTrigger">
      <span class="sheet-trigger-icon">＋</span> Tasks
    </button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </main>

  <!-- ── Bottom Sheet ── -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">Task Pool</div>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>

    <!-- Slot picker (shown when task is selected) -->
    <div class="slot-picker" id="slotPicker" hidden>
      <div class="slot-picker-label">Assign to slot:</div>
      <div class="slot-picker-grid" id="slotPickerGrid"></div>
      <button class="slot-picker-back" id="slotPickerBack">← Back to tasks</button>
    </div>

    <!-- Task list -->
    <div class="task-pool" id="taskPool">
      <div class="pool-loading" id="poolLoading">Loading tasks…</div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottomnav">
    <button class="bn-btn" onclick="location.href='/pwa/core4/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span>CORE</span>
    </button>
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 0-6 6-6 12a6 6 0 0 0 12 0c0-6-6-12-6-12z"/><path d="M12 12c0 0-3 3-3 5a3 3 0 0 0 6 0c0-2-3-5-3-5z"/></svg>
      <span>FIRE</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/focus/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      <span>FOCUS</span>
    </button>
    <button class="bn-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>SCORE</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script src="/pwa/gas-fallback.js"></script>
  <script src="/pwa/fire/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/fire/sw.js", { scope: "/pwa/fire/" });
    }
  </script>
</body>
</html>
