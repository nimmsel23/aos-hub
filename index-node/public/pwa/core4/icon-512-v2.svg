<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="αOS Core4">
  <defs>
    <linearGradient id="grad512" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5db85d"/>
      <stop offset="33%" stop-color="#5b9dd8"/>
      <stop offset="66%" stop-color="#b85db8"/>
      <stop offset="100%" stop-color="#d89d5b"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="#0b0c0f"/>

  <!-- 4 Domain quadrant glows -->
  <circle cx="192" cy="192" r="76" fill="#5db85d" opacity=".10"/>
  <circle cx="320" cy="192" r="76" fill="#5b9dd8" opacity=".10"/>
  <circle cx="192" cy="320" r="76" fill="#b85db8" opacity=".10"/>
  <circle cx="320" cy="320" r="76" fill="#d89d5b" opacity=".10"/>

  <!-- Central ring (progress metaphor) -->
  <circle cx="256" cy="256" r="112" fill="none" stroke="#1e2128" stroke-width="12"/>
  <circle cx="256" cy="256" r="112" fill="none" stroke="url(#grad512)" stroke-width="12" stroke-linecap="round" stroke-dasharray="528 176"/>

  <!-- 4 Domain dots on the ring -->
  <circle cx="256" cy="144" r="16" fill="#5db85d"/>
  <circle cx="368" cy="256" r="16" fill="#5b9dd8"/>
  <circle cx="256" cy="368" r="16" fill="#b85db8"/>
  <circle cx="144" cy="256" r="16" fill="#d89d5b"/>

  <!-- Domain piktograms inside dots -->
  <!-- BODY (top) - dumbbell -->
  <path d="M250 144h12M248 140v8M264 140v8" stroke="#0b0c0f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- BEING (right) - clock -->
  <circle cx="368" cy="256" r="7" fill="none" stroke="#0b0c0f" stroke-width="2"/>
  <path d="M368 252v4l3 2" stroke="#0b0c0f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- BALANCE (bottom) - people -->
  <circle cx="253" cy="364" r="3" fill="#0b0c0f"/><circle cx="259" cy="364" r="3" fill="#0b0c0f"/>
  <path d="M249 372a4 4 0 0 1 4-4h0a4 4 0 0 1 4 4" stroke="#0b0c0f" stroke-width="1.5" fill="none"/>
  <!-- BUSINESS (left) - lightning -->
  <path d="M146 250l-4 6h5l-3 6" stroke="#0b0c0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center "4" -->
  <text x="256" y="276" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="86" font-weight="900" fill="#e8ecf0" letter-spacing="-2">4</text>
</svg>
