<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · CORE4</title>
  <link rel="manifest" href="/pwa/core4/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/core4/icon-192-v2.svg" />
  <link rel="stylesheet" href="/pwa/core4/style.css" />
</head>
<body>

  <!-- App header -->
  <header class="appbar">
    <span class="app-title">αOS · CORE4</span>
    <span class="app-date" id="dateLabel">—</span>
  </header>

  <main class="wrap">

    <!-- Hero -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="50" />
          <circle class="ring-track" cx="60" cy="60" r="50" id="ringTrack" />
        </svg>
        <div class="ring-center">
          <span class="ring-pct" id="dailyPct">0%</span>
          <span class="ring-sub">TODAY</span>
        </div>
      </div>

      <div class="hero-scores">
        <div class="hs-block">
          <div class="hs-label">DAILY SCORE</div>
          <div class="hs-value"><span id="dailyScore">0</span><span class="hs-max">/4</span></div>
        </div>
        <div class="hs-block">
          <div class="hs-label">WEEKLY SCORE</div>
          <div class="hs-value"><span id="weeklyScore">0</span><span class="hs-max">/28</span></div>
        </div>
        <div class="hs-block">
          <div class="hs-label">WEEK</div>
          <div class="hs-value hs-week" id="weekLabel">—</div>
        </div>
      </div>
    </section>

    <!-- Heatmap -->
    <div class="section-label">
      <span>THIS WEEK</span>
      <span class="sl-hint">daily score per day</span>
    </div>
    <section class="heatmap" id="heatmap"></section>

    <!-- Section label -->
    <div class="section-label">
      <span>HABITS</span>
      <span class="sl-hint">ring = completions this week / 7</span>
    </div>

    <!-- Cards -->
    <section id="cards" class="cards"></section>

    <!-- Journal -->
    <div class="section-label" style="margin-top:20px">
      <span>JOURNAL</span>
    </div>
    <section class="journal-section">
      <div class="journal-controls">
        <select id="journalHabit" class="journal-select">
          <option value="body:fitness">Fitness</option>
          <option value="body:fuel">Fuel</option>
          <option value="being:meditation">Meditation</option>
          <option value="being:memoirs">Memoirs</option>
          <option value="balance:person1">Partner</option>
          <option value="balance:person2">Posterity</option>
          <option value="business:discover">Discover</option>
          <option value="business:declare">Declare</option>
        </select>
      </div>
      <textarea id="journalInput" class="journal-input" placeholder="Write your journal entry..." rows="3"></textarea>
      <div class="journal-actions">
        <span class="journal-status" id="journalStatus"></span>
        <button id="journalSave" class="journal-save">SAVE</button>
      </div>
      <div class="journal-list" id="journalList"></div>
    </section>

    <div class="toast" id="toast"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottomnav">
    <button class="bn-btn" onclick="location.href='/pwa/fitness/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h4v10H4z"/><path d="M16 7h4v10h-4z"/><path d="M8 10h8v4H8z"/></svg>
      <span>FITNESS</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/memoirs/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h12a4 4 0 0 1 4 4v10H8a4 4 0 0 0-4-4V5z"/><path d="M8 5v10"/></svg>
      <span>MEMOIRS</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/door/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="1"/><circle cx="14" cy="12" r="1"/></svg>
      <span>DOOR</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/game/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><circle cx="8" cy="16" r="3"/><circle cx="16" cy="16" r="3"/></svg>
      <span>GAME</span>
    </button>
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span>CORE4</span>
    </button>
  </nav>

  <script src="/pwa/gas-fallback.js"></script>
  <script src="/pwa/core4/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/core4/sw.js", { scope: "/pwa/core4/" });
    }
  </script>
</body>
</html>
