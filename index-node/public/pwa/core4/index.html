<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · CORE4</title>
  <link rel="manifest" href="/pwa/core4/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/core4/icon-192.svg" />
  <link rel="stylesheet" href="/pwa/core4/style.css" />
</head>
<body>

  <!-- App header -->
  <header class="appbar">
    <span class="app-title">αOS · CORE4</span>
    <span class="app-date" id="dateLabel">—</span>
  </header>

  <main class="wrap">

    <!-- Hero -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="50" />
          <circle class="ring-track" cx="60" cy="60" r="50" id="ringTrack" />
        </svg>
        <div class="ring-center">
          <span class="ring-pct" id="dailyPct">0%</span>
          <span class="ring-sub">TODAY</span>
        </div>
      </div>

      <div class="hero-scores">
        <div class="hs-block">
          <div class="hs-label">DAILY SCORE</div>
          <div class="hs-value"><span id="dailyScore">0</span><span class="hs-max">/4</span></div>
        </div>
        <div class="hs-block">
          <div class="hs-label">WEEKLY SCORE</div>
          <div class="hs-value"><span id="weeklyScore">0</span><span class="hs-max">/28</span></div>
        </div>
        <div class="hs-block">
          <div class="hs-label">WEEK</div>
          <div class="hs-value hs-week" id="weekLabel">—</div>
        </div>
      </div>
    </section>

    <!-- Section label -->
    <div class="section-label">
      <span>HABITS</span>
      <span class="sl-hint">ring = completions this week / 7</span>
    </div>

    <!-- Cards -->
    <section id="cards" class="cards"></section>

    <div class="toast" id="toast"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottomnav">
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span>CORE</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/fire/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 0-6 6-6 12a6 6 0 0 0 12 0c0-6-6-12-6-12z"/><path d="M12 12c0 0-3 3-3 5a3 3 0 0 0 6 0c0-2-3-5-3-5z"/></svg>
      <span>FIRE</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/focus/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      <span>FOCUS</span>
    </button>
    <button class="bn-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>SCORE</span>
    </button>
  </nav>

  <script src="/pwa/core4/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/core4/sw.js", { scope: "/pwa/core4/" });
    }
  </script>
</body>
</html>
