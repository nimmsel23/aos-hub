<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0d0e11"/>

  <!-- Outer ring -->
  <circle cx="96" cy="96" r="62" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>

  <!-- Middle ring -->
  <circle cx="96" cy="96" r="42" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>

  <!-- Inner filled circle -->
  <circle cx="96" cy="96" r="22" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>

  <!-- Center dot -->
  <circle cx="96" cy="96" r="5" fill="white"/>

  <!-- Crosshair lines (top) -->
  <line x1="96" y1="22" x2="96" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Crosshair lines (bottom) -->
  <line x1="96" y1="148" x2="96" y2="170" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Crosshair lines (left) -->
  <line x1="22" y1="96" x2="44" y2="96" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Crosshair lines (right) -->
  <line x1="148" y1="96" x2="170" y2="96" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- FOCUS label -->
  <text x="96" y="162" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="800"
        letter-spacing="3"
        fill="white" opacity="0.6">FOCUS</text>
</svg>
