<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0d0e11" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · FOCUS</title>
  <link rel="manifest" href="/pwa/focus/manifest.json" />
  <link rel="apple-touch-icon" href="/pwa/focus/icon-192.svg" />
  <link rel="stylesheet" href="/pwa/focus/style.css" />
</head>
<body>

  <!-- App header -->
  <header class="appbar">
    <span class="app-title">αOS · FOCUS</span>
    <span class="app-month" id="appbarMonth">—</span>
  </header>

  <!-- Shell: two-panel layout (list | editor), data-view switches on mobile -->
  <div class="shell" data-view="list">

    <!-- ── Left sidebar ── -->
    <aside class="panel-left">

      <!-- Month + ring -->
      <div class="panel-head">
        <div class="panel-head-info">
          <div class="panel-label">MONTHLY FOCUS</div>
          <div class="panel-month" id="monthLabel">—</div>
        </div>
        <div class="mini-ring" id="miniRing">
          <div class="mini-ring-inner"><span id="overallPct">0%</span></div>
        </div>
      </div>

      <!-- Domain bars -->
      <div class="domain-bars" id="domainBars"></div>

      <!-- Mission pinned card -->
      <div class="entries-section-label">MISSION</div>
      <button class="mission-card" id="btnMission" aria-label="Open Mission">
        <div class="mission-card-icon">
          <!-- Target/crosshair SVG -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4.5"/>
            <line x1="12" y1="2" x2="12" y2="5.5"/>
            <line x1="12" y1="18.5" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5.5" y2="12"/>
            <line x1="18.5" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        <div class="mission-card-body">
          <div class="mission-card-label">MISSION</div>
          <div class="mission-card-preview" id="missionPreview">No mission set yet…</div>
        </div>
      </button>

      <!-- Entry list -->
      <div class="entries-section-label">ENTRIES</div>
      <div class="entries-list" id="entryList"></div>

    </aside>

    <!-- ── Right editor panel ── -->
    <section class="panel-right">
      <div class="editor-head">
        <!-- Back button: mobile only -->
        <button class="back-btn" id="btnBack" aria-label="Back to list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="editor-title" id="editorTitle">—</div>
        <button class="save-btn" id="btnSave">Save</button>
      </div>
      <div class="editor-wrap">
        <textarea id="editor" class="editor" spellcheck="false" placeholder="Start writing…"></textarea>
      </div>
      <div class="editor-hint">Markdown · Obsidian-compatible</div>
    </section>

  </div><!-- /.shell -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom nav (matches core4) -->
  <nav class="bottomnav">
    <button class="bn-btn" onclick="location.href='/pwa/core4/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span>CORE</span>
    </button>
    <button class="bn-btn" onclick="location.href='/pwa/fire/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 0-6 6-6 12a6 6 0 0 0 12 0c0-6-6-12-6-12z"/><path d="M12 12c0 0-3 3-3 5a3 3 0 0 0 6 0c0-2-3-5-3-5z"/></svg>
      <span>FIRE</span>
    </button>
    <button class="bn-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      <span>FOCUS</span>
    </button>
    <button class="bn-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>SCORE</span>
    </button>
  </nav>

  <script src="/pwa/focus/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/pwa/focus/sw.js", { scope: "/pwa/focus/" });
    }
  </script>
</body>
</html>
