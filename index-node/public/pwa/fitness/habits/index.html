<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Habits - Fitness Centre</title>
    <link rel="manifest" href="/pwa/fitness/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa/fitness/icon-192.svg" />
    <link rel="stylesheet" href="../_shared/styles.css" />
    <style>
      .layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 14px;
        margin-top: 14px;
      }
      @media (max-width: 920px) {
        .layout { grid-template-columns: 1fr; }
      }
      .side { padding: 14px; }
      .main { padding: 14px; display: grid; gap: 14px; }
      .side h2 { font-size: 18px; margin-bottom: 10px; }
      .list { display: grid; gap: 8px; max-height: 52vh; overflow: auto; padding-right: 6px; }
      .item {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 10px 10px; border-radius: 12px; border: 1px solid var(--line);
        background: rgba(255,255,255,0.72); cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease;
      }
      .item:hover { transform: translateY(-1px); border-color: rgba(228, 87, 46, 0.25); }
      .item.active { border-color: rgba(27, 153, 139, 0.4); }
      .item .date { font-weight: 800; }
      .item .tag { font-size: 12px; color: var(--muted); }
      .habits-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .habit-card {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        border-radius: 16px;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
      }
      .ring {
        --ring-color: var(--accent);
        --ring-turn: 0turn;
        width: 124px;
        height: 124px;
        border-radius: 50%;
        background: conic-gradient(var(--ring-color) 0 var(--ring-turn), rgba(19,23,32,0.14) 0 1turn);
        display: grid;
        place-items: center;
        position: relative;
        box-shadow: 0 10px 24px rgba(0,0,0,0.2);
        transition: transform 120ms ease;
      }
      .ring::after {
        content: "";
        width: 92px;
        height: 92px;
        background: rgba(245,240,232,0.96);
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(19,23,32,0.1);
      }
      .ring:hover { transform: translateY(-2px); }
      .ring-inner {
        position: absolute;
        text-align: center;
        display: grid;
        gap: 2px;
        padding: 6px;
      }
      .ring-value { font-weight: 800; font-size: 18px; }
      .ring-label { font-size: 12px; color: var(--muted); }
      .actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .btn.small { padding: 6px 10px; font-size: 12px; }
      .meta { font-size: 12px; color: var(--muted); text-align: center; }
      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 10px;
        background: rgba(255,255,255,0.8);
        color: var(--ink);
      }
      .hint { color: var(--muted); font-size: 13px; line-height: 1.35; }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <main class="shell">
      <header class="top reveal" style="--delay: 20ms;">
        <div class="row" style="justify-content: space-between; align-items: baseline; gap: 12px;">
          <div>
            <div class="kicker">Habits</div>
            <h1>Circle Tracker</h1>
          </div>
          <a class="btn ghost" href="../">Back</a>
        </div>
        <div class="bar">
          <div class="row">
            <button class="btn primary" id="connectBtn">Connect Folder</button>
            <span class="mono" id="status">read-only</span>
          </div>
          <div class="row">
            <input type="date" id="dateInput" />
            <button class="btn" id="loadBtn">Load</button>
            <button class="btn" id="newBtn">New</button>
            <button class="btn primary" id="saveBtn" disabled>Save</button>
          </div>
        </div>
        <p class="lead">Daily habit circles with simple progress math.</p>
      </header>

      <section class="layout">
        <aside class="panel side reveal" style="--delay: 120ms;">
          <h2>Recent</h2>
          <div class="list" id="list"></div>
          <p class="hint" style="margin-top: 10px;">
            Files are stored under <code>personal/habits/YYYY-MM-DD.json</code>.
          </p>
        </aside>

        <section class="panel main reveal" style="--delay: 160ms;">
          <div class="habits-grid" id="habitsGrid"></div>
          <div>
            <div class="row" style="justify-content: space-between;">
              <strong>Notes</strong>
              <span class="meta" id="summary"></span>
            </div>
            <textarea id="notes" placeholder="Short notes for today..."></textarea>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/pwa/fitness/sw.js", { scope: "/pwa/fitness/" });
      }
    </script>
  </body>
</html>
