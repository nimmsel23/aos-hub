<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Fitness Centre</title>
    <link rel="manifest" href="/pwa/fitness/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa/fitness/icon-192.svg" />
    <link rel="stylesheet" href="./_shared/styles.css" />
  </head>
  <body>
    <style>
      body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0c0f14; color:#f5f7fb; font:16px/1.5 "Inter", system-ui, -apple-system, sans-serif; }
      .card { padding:24px 28px; border-radius:14px; background:#111927; border:1px solid #1f2b3a; max-width:520px; text-align:center; box-shadow:0 12px 32px rgba(0,0,0,0.3); }
      h1 { margin:0 0 8px; font-size:22px; }
      p { margin:6px 0; color:#a5b4c3; }
      a { color:#5eead4; font-weight:700; text-decoration:none; }
    </style>
    <main class="shell">
      <div class="card">
        <h1>Fitness Centre ist umgezogen</h1>
        <p>Bitte nutze die neue App:</p>
        <p><a href="http://127.0.0.1:8780">http://127.0.0.1:8780</a></p>
        <p>UI + API laufen gemeinsam auf Port 8780 (PWA-fähig).<br/>Diese alte PWA bleibt nur als Hinweis bestehen.</p>
      </div>
    </main>
  </body>
</html>
