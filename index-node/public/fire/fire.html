<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>αOS · FIRE</title>
  <link rel="stylesheet" href="/fire/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">αOS</div>
    <div class="tabs">
      <button class="tab" onclick="location.href='/core4/'">CORE</button>
      <button class="tab active">FIRE</button>
      <button class="tab" onclick="location.href='/focus/'">FOCUS</button>
      <button class="tab" onclick="location.href='/'">HUB</button>
    </div>
  </header>

  <main class="wrap">

    <!-- Hero -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="52" />
          <circle class="ring-track" cx="60" cy="60" r="52" id="ringTrack" />
        </svg>
        <div class="ring-center">
          <div class="ring-score" id="strikesDone">0</div>
          <div class="ring-label">/ 16</div>
        </div>
      </div>
      <div class="scores">
        <div class="score-card">
          <div class="sc-label">STRIKES</div>
          <div class="sc-value"><span id="strikePct">0%</span></div>
        </div>
        <div class="score-card">
          <div class="sc-label">WEEK</div>
          <div class="sc-value sc-week" id="weekLabel">—</div>
        </div>
      </div>
    </section>

    <!-- Section head -->
    <div class="section-head">
      <span class="sh-title">FIRE</span>
      <span class="sh-sub">STRUCTURED BLAZE · 4×4</span>
    </div>

    <!-- Domain cards -->
    <section id="cards" class="cards"></section>

    <!-- Add from tasks button -->
    <button class="sheet-trigger" id="sheetTrigger">
      <span class="sheet-trigger-icon">＋</span> Tasks
    </button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </main>

  <!-- ── Bottom Sheet ── -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">Task Pool</div>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>

    <!-- Slot picker (shown when task is selected) -->
    <div class="slot-picker" id="slotPicker" hidden>
      <div class="slot-picker-label">Assign to slot:</div>
      <div class="slot-picker-grid" id="slotPickerGrid"></div>
      <button class="slot-picker-back" id="slotPickerBack">← Back to tasks</button>
    </div>

    <!-- Task list -->
    <div class="task-pool" id="taskPool">
      <div class="pool-loading" id="poolLoading">Loading tasks…</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script src="/fire/app.js"></script>
</body>
</html>
